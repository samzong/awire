name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: typecheck & dry-run deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm/action-setup must run BEFORE actions/setup-node so that the pnpm
      # executable is on PATH when setup-node looks for it. We pin to v11 to
      # match local development (pnpm-workspace.yaml uses v11+ syntax).
      #
      # We deliberately do NOT pass `cache: pnpm` to setup-node: that flag
      # invokes `pnpm store path`, which mis-detects pnpm-workspace.yaml as
      # a workspace root and fails with "packages field missing or empty"
      # because this file only carries onlyBuiltDependencies. pnpm's own
      # global store is already an effective cache across runs via the
      # setup-pnpm action below.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # wrangler 4.x requires node >= 22 (it imports node:sqlite).
          # Keep this in sync with README prerequisites.
          node-version: 22

      - name: Install
        run: pnpm install --frozen-lockfile
        # `prepare` runs here and rebuilds src/panel/generated-css.ts

      - name: Generate Worker types
        run: pnpm types
        # worker-configuration.d.ts is gitignored (it is produced by
        # `wrangler types` from wrangler.jsonc bindings). tsconfig.json
        # references it, so it must exist before typecheck.

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify generated OpenAPI is current
        run: pnpm check:openapi

      - name: Verify generated CSS builds cleanly
        run: pnpm build:css
        # src/panel/generated-css.ts is gitignored — it is rebuilt by the
        # `prepare` step during install and by every dev/deploy script. This
        # step just confirms the build is reproducible from source.

      - name: Dry-run deploy
        run: pnpm deploy:dry
        # --dry-run never contacts the Cloudflare API for real. No credentials
        # are passed, so this job is structurally incapable of deploying.
